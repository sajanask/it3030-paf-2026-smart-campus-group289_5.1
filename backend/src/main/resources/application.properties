# 1. The Database URL (Tells Spring Boot to look at your XAMPP database)
spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus_db

# 2. XAMPP Default Username
spring.datasource.username=root

# 3. XAMPP Default Password (LEAVE THIS COMPLETELY BLANK!)
spring.datasource.password=

# 4. Hibernate Auto-Generation (This tells Spring to build your tables for you)
spring.jpa.hibernate.ddl-auto=update

# 5. Show SQL (Helpful to see what Spring is doing in the background)
spring.jpa.show-sql=true