spring.application.name=backend

# MongoDB configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:smartcampus}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.authentication-database=admin

# Connection pool settings
spring.data.mongodb.max-pool-size=50
spring.data.mongodb.min-pool-size=10
spring.data.mongodb.max-connection-idle-time=60000

# Logging
logging.level.org.springframework.data.mongodb=INFO
